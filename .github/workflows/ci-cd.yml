name: CI/CD

env:
  APP_NAME: calendar-no-mi
  GO_VERSION: 1.25.0

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment Version
        id: versioning
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(major)"
          minor_pattern: "(minor)"
          version_format: "${major}.${minor}.${increment}"

      - name: Add version to environment
        run: echo "APP_VERSION=${{ steps.versioning.outputs.version }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create .env File
        run: |
          echo "Generating .env file"

          echo "# Autogenerated .env file" > .env
          echo "APP_VERSION=${{ env.APP_VERSION }}" >> .env
          echo "REGISTRY=${{ secrets.DOCKER_USERNAME }}" >> .env
          echo "HTTP_PORT=8080" >> .env
          echo "HTTP_BEARER_TOKEN=${{ secrets.HTTP_BEARER_TOKEN }}" >> .env
          echo "GOOGLE_CREDENTIALS_FILE=credentials.json" >> .env
          echo "GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}" >> .env
          echo "GOOGLE_CALENDAR_ID=${{ secrets.GOOGLE_CALENDAR_ID }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "DEFAULT_TIMEZONE=${{ secrets.DEFAULT_TIMEZONE }}" >> .env
          echo "APP_ENV=production" >> .env

      - name: Copy Files To Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_HOST }}
          username: ${{ secrets.DEPLOYMENT_SSH_USER }}
          key: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          source: "./docker-compose.yml,./.env"
          target: "~/${{ github.event.repository.name }}/"

      - name: Start Application
        uses: appleboy/ssh-action@v1.2.0
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_HOST }}
          username: ${{ secrets.DEPLOYMENT_SSH_USER }}
          key: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          envs: GOOGLE_CREDENTIALS_JSON
          script: |
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            cd ~/${{ github.event.repository.name }}
            echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json
            docker compose down --remove-orphans
            docker compose up -d
            docker images "${{ secrets.DOCKER_USERNAME }}/calendar-no-mi" \
              --format "{{.Tag}}" | \
              grep -v "^${{ env.APP_VERSION }}$" | \
              xargs -I {} docker rmi "${{ secrets.DOCKER_USERNAME }}/calendar-no-mi:{}" || true
            curl --fail --retry 5 --retry-delay 3 http://localhost:8090/health

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          generate_release_notes: true
